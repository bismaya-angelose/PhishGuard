<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>⚠️ Phishing Blocked</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      width: 600px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      color: #d60000;
    }

    .url {
      word-break: break-all;
      background: #f5f5f5;
      padding: 10px;
      margin-top: 15px;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #d60000;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🚨 Phishing Website Blocked</h1>
    <p>
      This website has been identified as a
      <strong>potential phishing attempt</strong>.
    </p>

    <p><b>Detection Source:</b> Machine Learning</p>

    <div id="blockedUrl" class="url"></div>

    <button id="closeBtn">Close Page</button>
    <button id="markSafe">Mark as Safe</button>

  </div>

  <script src="warning.js"></script>
</body>
</html>
